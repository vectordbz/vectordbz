name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the use case clearly so we can understand the need.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or limitation you're running into.
      placeholder: "I often need to... but currently..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Related Database (if applicable)
      options:
        - Not database-specific
        - Qdrant
        - Weaviate
        - Milvus
        - ChromaDB
        - Pinecone
        - pgvector (PostgreSQL)
        - Elasticsearch
        - RedisSearch
        - New database integration

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references that might help.
