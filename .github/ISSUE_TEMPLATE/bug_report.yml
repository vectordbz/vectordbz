name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the details below to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: VectorDBZ Version
      description: Found in the header of the app (hover over the version badge)
      placeholder: "e.g. 0.0.17"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database Type
      description: Which database were you connected to when the bug occurred?
      options:
        - Qdrant
        - Weaviate
        - Milvus
        - ChromaDB
        - Pinecone
        - pgvector (PostgreSQL)
        - Elasticsearch
        - RedisSearch
        - Not database-specific
    validations:
      required: true

  - type: input
    id: db_version
    attributes:
      label: Database Version
      placeholder: "e.g. Qdrant 1.9.0"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Connect to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: node_logs
    attributes:
      label: Node.js / Main Process Logs
      description: |
        Paste the contents of the app log file (main process / Node.js backend). Log files are at:
        - Windows: `%APPDATA%\vectordbz\logs\main.log`
        - macOS: `~/Library/Logs/vectordbz/main.log`
        - Linux: `~/.config/vectordbz/logs/main.log`

        You can also find the exact path in the app: open **Settings → About** and click **Open Log File**.
      render: shell

  - type: textarea
    id: console_logs
    attributes:
      label: Browser Console Logs
      description: |
        Open DevTools with **F12**, go to the **Console** tab, reproduce the bug, then paste any errors or warnings here.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem. You can drag and drop images directly into this field.
