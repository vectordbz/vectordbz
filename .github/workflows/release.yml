name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-15-intel
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    # Vite renderer build (antd + plotly) exceeds the default ~2GB heap on CI runners.
    env:
      NODE_OPTIONS: --max-old-space-size=4096

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Node 22 LTS: Electron Forge / @electron/packager require >=22.12, and
      # Node 24.16.0+ has a regression that makes extract-zip (used to unpack the
      # Electron template) silently hang and exit 0 with no output.
      # See nodejs/node#63487 and electron/electron#51619.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg fakeroot rpm xz-utils

      - name: Build and Make
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
        run: |
          set +e
          npm run make -- --arch=${{ matrix.arch }}
          rc=$?
          echo "=== electron-forge make exit code: $rc ==="
          if [ "$rc" -ne 0 ]; then
            echo "::error::electron-forge make exited with code $rc"
            exit "$rc"
          fi
          if [ ! -d out/make ] || [ -z "$(find out/make -type f 2>/dev/null)" ]; then
            echo "::error::No installers were produced in out/make"
            find out -maxdepth 6 -print 2>/dev/null || echo "(no out/ directory)"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: app/out/make/**/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate update YAML files
        run: node scripts/generate-update-files.js

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
